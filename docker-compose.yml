# Use root/example as user/password credentials
services:
  mysqldb:
    image: mysql:9.1.0
    container_name: mysql-test-general-service
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: handson_java_spring_maven
      MYSQL_USER: mysql_user
      MYSQL_PASSWORD: mysql_password
    ports:
      - "3306:3306"
    expose:
      - 3306
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
    volumes:
      - ./misc/mysql:/docker-entrypoint-initdb.d
